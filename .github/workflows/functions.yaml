name: functions

on:
  workflow_dispatch:

jobs:
  job_1:
    runs-on: ubuntu-latest
    steps:
        - name: echo java version
          run:  |
            java -version
            exit 1

        - name: Runs only in success
          if: ${{ success() }}
          run: echo "This runs only if the previous step was successful."

        - name: Runs only in failed
          if: ${{ failure() }}
          run: echo "if failed."

        - name: Runs only in success
          if: ${{ always() }}
          run: echo "if failed."