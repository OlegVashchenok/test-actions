name: greeting action use

on:
  workflow_dispatch:

jobs:
 job_1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Greeting
        id: greeting
        uses: ./.github/actions/greeting
        with:
          name: 'Olha'
      - name: print message
        run: echo ${{ steps.greeting.outputs.message }}

